name: Publish to npm

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions: {}

jobs:
  publish:
    if: github.repository == 'sanderdatema/see_my_clicks'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest

      - name: Publish
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.ref_type }}" = "tag" ]; then
            npm publish --provenance
          elif echo "$VERSION" | grep -q "alpha"; then
            npm publish --provenance --tag alpha
          else
            echo "Skipping publish: version $VERSION is not alpha (stable publishes via v* tag)"
          fi
